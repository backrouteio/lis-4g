# LIS Standalone Server Configuration

server:
  host: 0.0.0.0
  port: 8001
  debug: false
  log_level: INFO

# HI1 Interface - Warrant Management
hi1:
  enabled: true
  description: "Warrant activation/deactivation interface"

# X1 Interface - Task Provisioning
x1:
  enabled: true
  port: 8001
  description: "HTTP polling for active intercept tasks"
  poll_timeout: 30

# X2 Interface - IRI Delivery
x2:
  enabled: true
  port: 4000
  protocol: TPKT
  description: "TPKT/RFC1006 TCP for IRI event delivery"
  encoding: ASN1-BER

# X3 Interface - CC Delivery
x3:
  enabled: true
  port: 4001
  protocol: UDP
  description: "UDP for call content delivery"
  encoding: ULIC

# HI3 Interface - FTP Delivery
hi3:
  enabled: true
  ftp_host: 10.80.20.45
  ftp_port: 21
  ftp_user: lea
  ftp_password: lea
  protocol: FTP
  description: "FTP plaintext delivery to LEA (tcpdump capturable)"

# Database
database:
  type: sqlite
  path: ./lis_standalone.db
  backup: true
  backup_interval: 3600

# Logging
logging:
  file: ./logs/lis-server.log
  max_size: 10485760  # 10MB
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# API Documentation
swagger:
  enabled: true
  title: "LIS-4G Backend API"
  version: "1.0.0"
  description: "4G LTE Lawful Interception System - Backend Only"
  docs_url: "/docs"
  redoc_url: "/redoc"
  openapi_url: "/openapi.json"
